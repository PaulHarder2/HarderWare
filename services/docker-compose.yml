# services/docker-compose.yml
# WX-63 - run the containerized WxMonitor.Svc. Step 1 of the WX-7 containerization arc; the
# pattern here (build a region-agnostic image, then inject its world at run time) is what
# WX-64/65/66 will reuse. Launch from this directory:  docker compose up -d --build
#
# ============================================================================================
# NETWORK TOPOLOGY  (settled for WX-63; named per-region networks belong to the OpRegion work)
# --------------------------------------------------------------------------------------------
# wxmonitor runs on Compose's default (project-scoped) network and reaches everything it needs
# through the SAME host doorway it already uses for the database - no custom Docker network:
#     SQL Server   (native on the host)                        -> host.docker.internal,1433  (WX-67 proved this)
#     otel-collector (a container publishing 4318 to the host) -> host.docker.internal:4318
# The four WxServices never talk to each other directly - they coordinate through the shared
# database - so the only cross-container hop is to otel-collector, which the host's published
# port already covers. This keeps WX-63 minimal and touches nothing in the (boot-race-sensitive)
# observability stack.
#
# This forecloses no future topology: the network is a run-time-injected property (the image is
# network-agnostic), and Compose already namespaces the default network per project name, so a
# `-p hw-prod` / `-p hw-dev` launch each gets an isolated net where internal names resolve per
# region. Explicit named/shared networks become a deliberate call in the OpRegion epic, driven
# by the per-region-vs-shared observability decision - not needed here.
# ============================================================================================

services:
  wxmonitor:
    build:
      context: ..                                  # build context = HarderWare repo root (same for all 4 services)
      dockerfile: services/wxmonitor/Dockerfile
    image: wxmonitor:dev                           # image tag; a real OpRegion pins a versioned tag (e.g. 1.51.0) later
    extra_hosts:
      - "host.docker.internal:host-gateway"        # guarantees the host is reachable by that name on any Docker engine
    volumes:
      # CONFIG door: secrets + per-deploy overrides (DB connection string, OTel endpoint at
      # host.docker.internal:4318, AlertEmail), injected READ-ONLY. The image never carries these.
      # The real file is gitignored; commit only appsettings.local.json.example beside this compose.
      - ./wxmonitor/appsettings.local.json:/opt/wxservices/appsettings.local.json:ro
      # STORAGE door: log + heartbeat bind mount. The containerized service writes here and
      # WxManager (still native on Windows) reads the SAME files via the host InstallRoot\Logs.
      # Source = the resolved host InstallRoot\Logs, passed by Deploy-WxService.ps1 as
      # WX_HOST_LOGS_DIR (default C:/HarderWare/Logs) so a non-default InstallRoot still matches
      # where native components look. From WSL the path would be /mnt/c/... - see the walkthrough.
      - ${WX_HOST_LOGS_DIR:-C:/HarderWare/Logs}:/opt/wxservices/Logs:rw
    restart: unless-stopped                        # WX-68: the engine restarts this on crash AND on reboot (Docker Desktop autostarts the engine at login, then restarts unless-stopped containers) - this is the auto-recovery gap fix. Compose healthcheck is added in WX-68 Unit 2 (needs heartbeats on WxMonitor/WxVis first).

  wxreport:
    build:
      context: ..                                  # build context = HarderWare repo root (same for all 4 services)
      dockerfile: services/wxreport/Dockerfile
    image: wxreport:dev                            # image tag; a real OpRegion pins a versioned tag later
    extra_hosts:
      - "host.docker.internal:host-gateway"        # guarantees the host is reachable by that name on any Docker engine
    volumes:
      # CONFIG door: DB connection string + OTel endpoint, injected READ-ONLY. WxReport's other
      # secrets (SMTP, Claude/Gemini API keys) are read from the GlobalSettings DB row, NOT from a
      # file, so this stays as lean as wxmonitor's. The real file is gitignored; commit only the
      # appsettings.local.json.example beside this compose.
      - ./wxreport/appsettings.local.json:/opt/wxservices/appsettings.local.json:ro
      # STORAGE door: log + heartbeat bind mount. The containerized service writes here and WxManager
      # (native on Windows) + WxMonitor read the SAME files via the host InstallRoot\Logs. Source =
      # the resolved host InstallRoot\Logs, passed by Deploy-WxService.ps1 as WX_HOST_LOGS_DIR.
      - ${WX_HOST_LOGS_DIR:-C:/HarderWare/Logs}:/opt/wxservices/Logs:rw
      # PLOTS door (READ-ONLY): the meteogram PNGs WxVis renders and WxReport inlines into report
      # emails (ReportWorker -> WxPaths.PlotsDir). WxReport only reads them, so mount read-only.
      - ${WX_HOST_PLOTS_DIR:-C:/HarderWare/plots}:/opt/wxservices/plots:ro
      # QA door: the operator "Rerun QA" path (WX-235, QaRerunWorker) writes translation-qa HTML/JSON
      # review packages under InstallRoot\translation-qa; mount it so those land on the host, not in
      # the ephemeral container layer.
      - ${WX_HOST_QA_DIR:-C:/HarderWare/translation-qa}:/opt/wxservices/translation-qa:rw
    restart: unless-stopped                        # WX-68: the engine restarts this on crash AND on reboot (Docker Desktop autostarts the engine at login, then restarts unless-stopped containers) - this is the auto-recovery gap fix. Compose healthcheck is added in WX-68 Unit 2 (needs heartbeats on WxMonitor/WxVis first).

  wxvis:
    build:
      context: ..                                  # build context = HarderWare repo root (same for all 4 services)
      dockerfile: services/wxvis/Dockerfile
    image: wxvis:dev                               # image tag; a real OpRegion pins a versioned tag later
    extra_hosts:
      - "host.docker.internal:host-gateway"        # guarantees the host is reachable by that name on any Docker engine
    volumes:
      # CONFIG door: DB connection string (+ SQL login for the Python DB path) and OTel endpoint, plus
      # the in-container Python path (WxVis:CondaPythonExe -> /usr/bin/python3). Injected READ-ONLY;
      # the real file is gitignored - commit only appsettings.local.json.example beside this compose.
      - ./wxvis/appsettings.local.json:/opt/wxservices/appsettings.local.json:ro
      # STORAGE door: log + heartbeat bind mount, shared with the native WxManager/WxMonitor readers.
      - ${WX_HOST_LOGS_DIR:-C:/HarderWare/Logs}:/opt/wxservices/Logs:rw
      # PLOTS door (READ-WRITE): WxVis is the PRODUCER - it renders the synoptic/forecast/meteogram PNGs
      # into WxPaths.PlotsDir. WxReport (WX-64) mounts this SAME host dir READ-ONLY to inline them, and
      # WxManager/WxViewer read them too. Source = host InstallRoot\plots, via WX_HOST_PLOTS_DIR.
      - ${WX_HOST_PLOTS_DIR:-C:/HarderWare/plots}:/opt/wxservices/plots:rw
    restart: unless-stopped                        # WX-68: the engine restarts this on crash AND on reboot (Docker Desktop autostarts the engine at login, then restarts unless-stopped containers) - this is the auto-recovery gap fix. Compose healthcheck is added in WX-68 Unit 2 (needs heartbeats on WxMonitor/WxVis first).

  wxparser:
    build:
      context: ..                                  # build context = HarderWare repo root (same for all 4 services)
      dockerfile: services/wxparser/Dockerfile
    image: wxparser:dev                            # image tag; a real OpRegion pins a versioned tag later
    extra_hosts:
      - "host.docker.internal:host-gateway"        # guarantees the host is reachable by that name on any Docker engine
    volumes:
      # CONFIG door: DB connection string (+ SQL login) and OTel endpoint, plus the in-container wgrib2
      # path (Gfs:Wgrib2Path -> /usr/local/bin/wgrib2). Injected READ-ONLY; the real file is gitignored -
      # commit only appsettings.local.json.example beside this compose.
      - ./wxparser/appsettings.local.json:/opt/wxservices/appsettings.local.json:ro
      # STORAGE door: log + heartbeat bind mount, shared with the native WxManager/WxMonitor readers.
      - ${WX_HOST_LOGS_DIR:-C:/HarderWare/Logs}:/opt/wxservices/Logs:rw
      # No plots/temp mount: WxParser writes GRIB download/extract scratch to the ephemeral in-container
      # /opt/wxservices/temp (created writable in the Dockerfile), cleaned up after each fetch cycle.
    restart: unless-stopped                        # WX-68: the engine restarts this on crash AND on reboot (Docker Desktop autostarts the engine at login, then restarts unless-stopped containers) - this is the auto-recovery gap fix. Compose healthcheck is added in WX-68 Unit 2 (needs heartbeats on WxMonitor/WxVis first).
