# Image versions are pinned (WX-17, 2026-04-15) for reproducibility.  Bump
# deliberately when upgrading; check upstream release notes for breaking changes.
#
# This stack requires observability/.env with GRAFANA_ADMIN_PASSWORD set
# (WX-91, 2026-05-28).  The .env file is gitignored; source of truth for the
# value is RoboForm.  Without it, `docker compose up` fails fast with a named
# error rather than silently falling back to a weak default.
services:
  prometheus:
    image: prom/prometheus:v3.11.2
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus

  otel-collector:
    image: otel/opentelemetry-collector:0.150.1
    restart: unless-stopped
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol/config.yaml

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in observability/.env}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_DEFAULT_TIMEZONE=utc

volumes:
  prometheus-data:
  grafana-data:
