# Image versions are pinned (WX-17, 2026-04-15) for reproducibility.  Bump
# deliberately when upgrading; check upstream release notes for breaking changes.
# (prometheus & otel-collector now pin in their Dockerfile FROM line; grafana
# still pins on its `image:` line below.)
#
# prometheus and otel-collector build a thin local image that COPYs its config
# into the image instead of bind-mounting the config file from the host
# (WX-274).  A single-file host bind mount fails on Windows reboot: Docker
# Desktop auto-starts the containers before the Windows filesystem share is
# ready inside its Linux VM, so the unresolved bind source gets a directory
# placeholder mounted onto a config-FILE path -> exit 127.  Baking the config in
# removes the host dependency at boot.  ==> After editing prometheus.yml or
# otel-collector-config.yml, rebuild with:  docker compose up -d --build
#
# grafana keeps its directory bind mounts: directory mounts survive the reboot
# race (a placeholder directory is type-compatible), and baking its dashboards
# would force a rebuild on every dashboard edit.
#
# This stack requires observability/.env with GRAFANA_ADMIN_PASSWORD set
# (WX-91, 2026-05-28).  The .env file is gitignored; source of truth for the
# value is RoboForm.  Without it, `docker compose up` fails fast with a named
# error rather than silently falling back to a weak default.
services:
  prometheus:
    build:
      context: .
      dockerfile: prometheus.Dockerfile
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus

  otel-collector:
    build:
      context: .
      dockerfile: otel-collector.Dockerfile
    restart: unless-stopped
    ports:
      - "4317:4317"
      - "4318:4318"

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in observability/.env}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_DEFAULT_TIMEZONE=utc

volumes:
  prometheus-data:
  grafana-data:
