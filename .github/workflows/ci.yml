name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [master]
  workflow_dispatch:

# Cancel in-flight runs for the same ref when a new push arrives. Saves
# Actions minutes on rapid-fire force-pushes during PR iteration.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Forward-opt into Node.js 24 for JavaScript actions ahead of GitHub's
# 2026-06-02 default flip and the 2026-09-16 Node 20 removal. Eliminates
# the deprecation warning and forward-tests our actions while we still
# have schedule margin. Safe to leave in place after the default flips.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build, test, format-check, Linux-publish smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: WxServices
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Non-bypassable backstop for the local pre-push hook: fail fast if
      # Directory.Build.props and VERSIONS.md disagree on the current version
      # (the WX-80 1.8.0/1.7.1 class of mistake). Runs before the .NET setup
      # since it needs nothing but the checkout and git.
      - name: Version consistency (props vs VERSIONS.md)
        run: bash tools/check-version-consistency.sh

      # A .gitignore rule does NOT cover a file that is already tracked, so an
      # ignored build/staging directory can quietly hold a tracked, drifting copy
      # of a real source file. WX-329 found exactly that: release/WxVis/meteogram.py
      # had been tracked under a gitignored directory and had fallen 60 lines behind
      # src/WxVis/meteogram.py. Nothing would have caught it, so this makes the
      # invariant permanent rather than a one-time cleanup.
      - name: No tracked-but-ignored files
        run: |
          offenders=$(git ls-files -i -c --exclude-standard)
          if [ -n "$offenders" ]; then
            echo "::error::These files are tracked despite matching an ignore rule; they will drift unnoticed:"
            echo "$offenders"
            exit 1
          fi
          echo "No tracked-but-ignored files."

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: WxServices/**/*.csproj

      - name: Restore (cross-platform projects)
        run: dotnet restore WxServices.CI.slnf

      - name: Build (Release)
        run: dotnet build WxServices.CI.slnf -c Release --no-restore

      - name: Test (Release)
        run: dotnet test WxServices.CI.slnf -c Release --no-build --verbosity normal

      - name: Format check (no changes allowed)
        run: dotnet format WxServices.CI.slnf --verify-no-changes

      # Linux-publish smoke for the four headless services. Catches case-sensitive
      # path regressions, missing references, and similar Linux-specific issues
      # before any future cloud-deploy work needs them.
      - name: Publish WxParser.Svc (linux-x64)
        run: dotnet publish src/WxParser.Svc/WxParser.Svc.csproj -c Release -r linux-x64 --self-contained false -o /tmp/publish/WxParser.Svc

      - name: Publish WxReport.Svc (linux-x64)
        run: dotnet publish src/WxReport.Svc/WxReport.Svc.csproj -c Release -r linux-x64 --self-contained false -o /tmp/publish/WxReport.Svc

      - name: Publish WxMonitor.Svc (linux-x64)
        run: dotnet publish src/WxMonitor.Svc/WxMonitor.Svc.csproj -c Release -r linux-x64 --self-contained false -o /tmp/publish/WxMonitor.Svc

      - name: Publish WxVis.Svc (linux-x64)
        run: dotnet publish src/WxVis.Svc/WxVis.Svc.csproj -c Release -r linux-x64 --self-contained false -o /tmp/publish/WxVis.Svc
